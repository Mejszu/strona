<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@Mejszu</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<audio id="bg-music" src="music.mp3" loop preload="auto"></audio>

<div id="intro-overlay" onclick="enterSite()">
    <div id="intro-bg"></div>
    <div id="intro-text">click to enter...</div>
</div>

<div class="container">
    <div class="rectangle">
        <div class="avatar-section">
            <div class="avatar">
                <img src="avatar.png" alt="Avatar">
            </div>
            <div class="info">
                <h2 class="name">Mejszu</h2>
                <p class="description">
                    <span id="animated-text"></span>
                    <span class="cursor">|</span>
                </p>
            </div>
        </div>

        <div class="links-section">
            <div class="links-grid">
                <a href="https://www.youtube.com/@DragonCodePL" target="_blank" class="link-card youtube">
                    <i class="fab fa-youtube"></i>
                    <span>YouTube</span>
                </a>
                <a href="https://github.com/Mejszu" target="_blank" class="link-card github">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
                <a href="https://discord.gg/EHnCNBZu9z" target="_blank" class="link-card discord">
                    <i class="fab fa-discord"></i>
                    <span>Discord</span>
                </a>
                <a href="https://mejszu.pl/" target="_blank" class="link-card portfolio">
                    <i class="fas fa-globe"></i>
                    <span>Portfolio</span>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
